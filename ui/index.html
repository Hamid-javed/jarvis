<!DOCTYPE html>
<html lang="en" data-state="INITIALISING">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J · A · R · V · I · S</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #08081299;
      --panel:   #0c0c1a;
      --a1:      #6366f1;
      --a2:      #8b5cf6;
      --a3:      #a78bfa;
      --a4:      #c4b5fd;
      --border:  rgba(99,102,241,0.14);
      --text:    #e2e8f0;
      --muted:   rgba(226,232,240,0.35);
      --red:     #ef4444;
      --bar-h:   36px;
    }

    html, body {
      height: 100%; width: 100%;
      background: #070711;
      color: var(--text);
      font-family: "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: no-drag;
    }

    /* ── Title bar ─────────────────────────────────────────────────── */
    #titlebar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--bar-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      z-index: 100;
      background: rgba(7,7,17,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      -webkit-app-region: drag;
    }

    #traffic {
      display: flex;
      gap: 7px;
      -webkit-app-region: no-drag;
    }
    .dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .dot:hover { filter: brightness(1.3); }
    #dot-close { background: #ff5f57; }
    #dot-min   { background: #febc2e; }
    #dot-max   { background: #28c840; }

    #title-text {
      position: absolute;
      left: 50%; transform: translateX(-50%);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.4em;
      color: var(--a4);
      pointer-events: none;
    }

    #clock {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--a3);
      letter-spacing: 0.06em;
      font-weight: 500;
    }

    /* ── App shell ─────────────────────────────────────────────────── */
    #app {
      display: flex;
      height: 100%;
      padding-top: var(--bar-h);
    }

    /* ── LEFT panel ────────────────────────────────────────────────── */
    #left {
      flex: 0 0 48%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #0c0c1c 0%, #08081a 100%);
      border-right: 1px solid var(--border);
    }

    /* Ambient glow */
    #left::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 55% at 50% 45%, rgba(99,102,241,0.1) 0%, transparent 68%);
      pointer-events: none;
    }

    /* ── Avatar + orbit rings ──────────────────────────────────────── */
    #avatar-wrap {
      position: relative;
      width: 200px; height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Orbit rings */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid transparent;
      opacity: 0;
      transition: opacity 0.6s;
    }
    .ring-1 { width: 160px; height: 160px; border-color: rgba(99,102,241,0.28); }
    .ring-2 { width: 190px; height: 190px; border-color: rgba(139,92,246,0.18); }
    .ring-3 { width: 220px; height: 220px; border-color: rgba(167,139,250,0.12); }

    html[data-state="LISTENING"]  .ring { opacity: 1; }
    html[data-state="LISTENING"]  .ring-1 { animation: spin-cw  4s linear infinite; }
    html[data-state="LISTENING"]  .ring-2 { animation: spin-ccw 7s linear infinite; }
    html[data-state="LISTENING"]  .ring-3 { animation: spin-cw 11s linear infinite; }

    html[data-state="SPEAKING"]   .ring { opacity: 1; }
    html[data-state="SPEAKING"]   .ring-1 { animation: spin-cw  1.1s linear infinite; }
    html[data-state="SPEAKING"]   .ring-2 { animation: spin-ccw 2s   linear infinite; }
    html[data-state="SPEAKING"]   .ring-3 { animation: spin-cw  3.2s linear infinite; }

    html[data-state="THINKING"]   .ring,
    html[data-state="PROCESSING"] .ring { opacity: 0.55; }
    html[data-state="THINKING"]   .ring-1,
    html[data-state="PROCESSING"] .ring-1 { animation: spin-cw  2.5s linear infinite; }
    html[data-state="THINKING"]   .ring-2,
    html[data-state="PROCESSING"] .ring-2 { animation: spin-ccw 4.5s linear infinite; }
    html[data-state="THINKING"]   .ring-3,
    html[data-state="PROCESSING"] .ring-3 { animation: spin-cw  7s   linear infinite; }

    html[data-state="MUTED"]         .ring { opacity: 0.06; animation: none !important; }
    html[data-state="INITIALISING"]  .ring { opacity: 0;    animation: none !important; }

    @keyframes spin-cw  { to { transform: rotate(360deg);  } }
    @keyframes spin-ccw { to { transform: rotate(-360deg); } }

    /* Avatar circle */
    #avatar {
      width: 130px; height: 130px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 55%, #a78bfa 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      position: relative;
      z-index: 1;
      overflow: hidden;
      box-shadow:
        0 0 0 2px rgba(99,102,241,0.25),
        0 0 32px rgba(99,102,241,0.22),
        0 0 80px rgba(99,102,241,0.1);
      animation: breathe 4s ease-in-out infinite;
      transition: box-shadow 0.5s, background 0.5s;
    }

    #avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

    html[data-state="MUTED"] #avatar {
      background: linear-gradient(135deg, #7f1d1d 0%, #ef4444 60%, #f87171 100%);
      box-shadow: 0 0 0 2px rgba(239,68,68,0.3), 0 0 32px rgba(239,68,68,0.25), 0 0 80px rgba(239,68,68,0.1);
      animation: none;
    }

    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 2px rgba(99,102,241,0.25), 0 0 32px rgba(99,102,241,0.22), 0 0 80px rgba(99,102,241,0.1); }
      50%      { box-shadow: 0 0 0 3px rgba(99,102,241,0.4),  0 0 48px rgba(99,102,241,0.36), 0 0 110px rgba(99,102,241,0.18); }
    }

    /* ── Status pill ───────────────────────────────────────────────── */
    #status-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    #status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--a2);
      box-shadow: 0 0 6px var(--a2);
      animation: blink 1.5s ease-in-out infinite;
    }
    html[data-state="MUTED"]        #status-dot { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }
    html[data-state="THINKING"]     #status-dot,
    html[data-state="PROCESSING"]   #status-dot { animation: blink-fast 0.5s ease-in-out infinite; }
    html[data-state="INITIALISING"] #status-dot { animation: none; opacity: 0.25; box-shadow: none; }

    @keyframes blink      { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes blink-fast { 0%,100%{opacity:1} 50%{opacity:0.15} }

    /* ── Waveform ──────────────────────────────────────────────────── */
    #waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 28px;
    }

    .bar {
      width: 2.5px;
      border-radius: 2px;
      background: linear-gradient(to top, var(--a1), var(--a3));
      opacity: 0.4;
      transition: opacity 0.4s;
    }

    html[data-state="LISTENING"]  .bar { animation: wave var(--d,1s) ease-in-out infinite; opacity: 0.7; }
    html[data-state="SPEAKING"]   .bar { animation: wave var(--d,.5s) ease-in-out infinite; opacity: 1; }
    html[data-state="THINKING"]   .bar,
    html[data-state="PROCESSING"] .bar { animation: wave var(--d,1.8s) ease-in-out infinite; opacity: 0.3; }
    html[data-state="MUTED"]      .bar { animation: none !important; height: 2px !important; opacity: 0.12; }

    @keyframes wave { 0%,100%{transform:scaleY(0.2)} 50%{transform:scaleY(1)} }

    /* ── Live / mute button ────────────────────────────────────────── */
    #mute-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 100px;
      color: var(--text);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    #mute-btn:hover { background: rgba(99,102,241,0.12); border-color: var(--a1); }
    html[data-state="MUTED"] #mute-btn {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.3);
      color: #fca5a5;
    }

    #model-badge {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: rgba(167,139,250,0.35);
      text-transform: uppercase;
    }

    /* ── RIGHT panel ───────────────────────────────────────────────── */
    #right {
      flex: 0 0 52%;
      display: flex;
      flex-direction: column;
      background: #08081699;
    }

    /* Conversation header */
    #conv-header {
      flex: 0 0 auto;
      padding: 14px 20px 0;
    }

    #conv-label {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    /* Chat log */
    #chat-log {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    #chat-log::-webkit-scrollbar { width: 3px; }
    #chat-log::-webkit-scrollbar-track { background: transparent; }
    #chat-log::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.2); border-radius: 2px; }

    /* Message groups */
    .msg-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .msg-group-you  { align-items: flex-end; }
    .msg-group-ai   { align-items: flex-start; }
    .msg-group-sys  { align-items: center; }

    .msg-sender {
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 4px;
    }

    /* Bubbles */
    .msg {
      max-width: 82%;
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-you {
      background: rgba(99,102,241,0.16);
      border: 1px solid rgba(99,102,241,0.22);
      color: #c7d2fe;
      border-radius: 16px 16px 4px 16px;
    }

    .msg-ai {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 2px solid rgba(99,102,241,0.4);
      color: var(--text);
      border-radius: 4px 16px 16px 16px;
    }

    .msg-sys {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      background: none;
      border: none;
      padding: 2px 0;
      text-align: center;
    }

    .msg-err {
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.16);
      border-left: 2px solid rgba(239,68,68,0.5);
      color: #fca5a5;
      border-radius: 4px 12px 12px 12px;
    }

    /* Typing indicator (inside ai group) */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-left: 2px solid rgba(99,102,241,0.4);
      border-radius: 4px 16px 16px 16px;
      width: fit-content;
    }
    #typing-indicator.visible { display: flex; }

    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--a2);
      animation: t-bounce 1.1s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.16s; }
    .typing-dot:nth-child(3) { animation-delay: 0.32s; }

    @keyframes t-bounce {
      0%,80%,100% { transform:translateY(0); opacity:0.4; }
      40%          { transform:translateY(-5px); opacity:1; }
    }

    /* ── Input area ────────────────────────────────────────────────── */
    #input-area {
      flex: 0 0 auto;
      padding: 10px 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #text-input {
      flex: 1;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 24px;
      padding: 10px 18px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      line-height: 1.5;
      font-family: inherit;
      transition: border-color 0.2s, background 0.2s;
      caret-color: var(--a2);
    }
    #text-input::placeholder { color: var(--muted); }
    #text-input:focus {
      border-color: rgba(99,102,241,0.35);
      background: rgba(99,102,241,0.05);
    }

    #send-btn {
      width: 40px; height: 40px;
      flex-shrink: 0;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.2s, transform 0.12s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    #send-btn:hover  { filter: brightness(1.15); }
    #send-btn:active { transform: scale(0.94); }

    #input-hint {
      font-size: 10px;
      color: rgba(226,232,240,0.2);
      letter-spacing: 0.08em;
      text-align: right;
      padding-right: 2px;
    }

    /* ── Setup overlay ─────────────────────────────────────────────── */
    #setup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(7,7,17,0.9);
      backdrop-filter: blur(12px);
      align-items: center;
      justify-content: center;
    }
    #setup-overlay.visible { display: flex; }

    #setup-card {
      background: #0d0d1e;
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 20px;
      padding: 36px 40px;
      width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 0 60px rgba(99,102,241,0.08), 0 24px 60px rgba(0,0,0,0.7);
    }

    #setup-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.35em;
      color: var(--a4);
      text-align: center;
    }
    #setup-sub {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: -12px;
    }

    .setup-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .setup-field { display: flex; flex-direction: column; }

    #api-key-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      font-family: "SF Mono", "Cascadia Code", monospace;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }
    #api-key-input:focus { border-color: var(--a1); }
    #api-key-input::placeholder { color: rgba(226,232,240,0.18); font-family: inherit; letter-spacing: 0; }

    #os-selector { display: flex; gap: 8px; }

    .os-opt {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 6px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      cursor: pointer;
      font-size: 11px;
      color: var(--muted);
      transition: all 0.2s;
    }
    .os-opt:hover { background: rgba(99,102,241,0.1); border-color: var(--a1); color: var(--text); }
    .os-opt.selected { background: rgba(99,102,241,0.15); border-color: var(--a1); color: var(--a4); }
    .os-icon { font-size: 20px; }

    #setup-submit {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--a1), var(--a2));
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: filter 0.2s;
      box-shadow: 0 4px 16px rgba(99,102,241,0.3);
    }
    #setup-submit:hover { filter: brightness(1.12); }

    #setup-error {
      font-size: 12px;
      color: #fca5a5;
      text-align: center;
      min-height: 14px;
    }
  </style>
</head>
<body>

  <!-- Title bar -->
  <div id="titlebar">
    <div id="traffic">
      <div class="dot" id="dot-close" title="Close"  onclick="socket.emit('close')"></div>
      <div class="dot" id="dot-min"   title="Minimize"></div>
      <div class="dot" id="dot-max"   title="Maximize"></div>
    </div>
    <span id="title-text">J · A · R · V · I · S</span>
    <span id="clock"></span>
  </div>

  <!-- App -->
  <div id="app">

    <!-- LEFT -->
    <div id="left">

      <div id="avatar-wrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div id="avatar">🤖</div>
      </div>

      <div id="status-pill">
        <div id="status-dot"></div>
        <span id="status-text">INITIALISING</span>
      </div>

      <div id="waveform"></div>

      <button id="mute-btn" onclick="socket.emit('toggle_mute')">
        <span id="mute-icon">🎤</span>
        <span id="mute-label">Live · F4</span>
      </button>

      <div id="model-badge">MARK XXXVII</div>

    </div>

    <!-- RIGHT -->
    <div id="right">

      <div id="conv-header">
        <div id="conv-label">Conversation</div>
      </div>

      <div id="chat-log">
        <!-- messages injected here -->
        <div id="typing-group" class="msg-group msg-group-ai" style="display:none">
          <span class="msg-sender">JARVIS</span>
          <div id="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
      </div>

      <div id="input-area">
        <div id="input-row">
          <textarea
            id="text-input"
            rows="1"
            placeholder="Ask JARVIS anything…"
            autocomplete="off"
            spellcheck="false"
          ></textarea>
          <button id="send-btn" title="Send" onclick="sendText()">&#9658;</button>
        </div>
        <div id="input-hint">ENTER to send &nbsp;·&nbsp; F4 to mute</div>
      </div>

    </div>

  </div>

  <!-- Setup overlay -->
  <div id="setup-overlay">
    <div id="setup-card">
      <div id="setup-title">J · A · R · V · I · S</div>
      <div id="setup-sub">First-run configuration</div>

      <div class="setup-field">
        <div class="setup-label">Gemini API Key</div>
        <input type="password" id="api-key-input" placeholder="AIza…" autocomplete="off" spellcheck="false" />
      </div>

      <div class="setup-field">
        <div class="setup-label">Operating System</div>
        <div id="os-selector">
          <div class="os-opt" data-os="Windows" onclick="selectOs(this)"><span class="os-icon">🪟</span>Windows</div>
          <div class="os-opt" data-os="macOS"   onclick="selectOs(this)"><span class="os-icon">🍎</span>macOS</div>
          <div class="os-opt" data-os="Linux"   onclick="selectOs(this)"><span class="os-icon">🐧</span>Linux</div>
        </div>
      </div>

      <button id="setup-submit" onclick="submitSetup()">INITIALISE SYSTEMS</button>
      <div id="setup-error"></div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const socket = io();

    socket.on("setState",        s   => setState(s));
    socket.on("appendMessage",   d   => appendMessage(d.tag, d.text));
    socket.on("startTypewriter", t   => startTypewriter(t));
    socket.on("setFaceImage",    url => setFaceImage(url));
    socket.on("showSetup",       ()  => showSetup());
    socket.on("hideSetup",       ()  => hideSetup());

    const STATE_LABELS = {
      LISTENING:"LISTENING", SPEAKING:"SPEAKING",
      THINKING:"THINKING", PROCESSING:"PROCESSING",
      MUTED:"MUTED", INITIALISING:"INITIALISING",
    };

    /* Clock */
    (function() {
      const el = document.getElementById("clock");
      function tick() {
        const n = new Date();
        el.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()]
          .map(v => String(v).padStart(2,"0")).join(":");
      }
      tick(); setInterval(tick, 1000);
    })();

    /* Waveform */
    (function() {
      const wf = document.getElementById("waveform");
      [6,11,18,24,20,28,22,16,22,28,20,24,18,12,16,8].forEach((h, i) => {
        const b = document.createElement("div");
        b.className = "bar";
        b.style.height = h + "px";
        b.style.setProperty("--d", (0.6 + Math.random() * 0.9).toFixed(2) + "s");
        b.style.animationDelay = (i * 0.085).toFixed(2) + "s";
        wf.appendChild(b);
      });
    })();

    function setState(state) {
      document.documentElement.dataset.state = state;
      document.getElementById("status-text").textContent = STATE_LABELS[state] || state;
      const muted = state === "MUTED";
      document.getElementById("mute-icon").textContent  = muted ? "🔇" : "🎤";
      document.getElementById("mute-label").textContent = muted ? "Unmute · F4" : "Live · F4";
    }

    /* Add a message group to the chat log */
    function appendMessage(tag, text) {
      const log = document.getElementById("chat-log");
      const typingGroup = document.getElementById("typing-group");

      if (tag === "sys") {
        const el = document.createElement("div");
        el.className = "msg msg-sys";
        el.textContent = text;
        log.insertBefore(el, typingGroup);
        log.scrollTop = log.scrollHeight;
        return;
      }

      const group = document.createElement("div");
      const isYou = tag === "you";
      const isErr = tag === "err";
      group.className = "msg-group msg-group-" + (isYou ? "you" : "ai");

      const sender = document.createElement("span");
      sender.className = "msg-sender";
      sender.textContent = isYou ? "YOU" : (isErr ? "ERROR" : "JARVIS");
      group.appendChild(sender);

      const bubble = document.createElement("div");
      bubble.className = "msg msg-" + (isErr ? "err" : tag);
      bubble.textContent = text;
      group.appendChild(bubble);

      log.insertBefore(group, typingGroup);
      log.scrollTop = log.scrollHeight;
    }

    function startTypewriter(text) {
      const log          = document.getElementById("chat-log");
      const typingGroup  = document.getElementById("typing-group");
      const indicator    = document.getElementById("typing-indicator");

      typingGroup.style.display = "";
      indicator.classList.add("visible");
      log.scrollTop = log.scrollHeight;

      setTimeout(() => {
        indicator.classList.remove("visible");
        typingGroup.style.display = "none";

        const group = document.createElement("div");
        group.className = "msg-group msg-group-ai";

        const sender = document.createElement("span");
        sender.className = "msg-sender";
        sender.textContent = "JARVIS";
        group.appendChild(sender);

        const bubble = document.createElement("div");
        bubble.className = "msg msg-ai";
        bubble.textContent = "";
        group.appendChild(bubble);

        log.insertBefore(group, typingGroup);
        log.scrollTop = log.scrollHeight;

        let i = 0;
        function tick() {
          if (i < text.length) {
            bubble.textContent += text[i++];
            log.scrollTop = log.scrollHeight;
            setTimeout(tick, 16);
          }
        }
        tick();
      }, 420);
    }

    function setFaceImage(dataUrl) {
      const a = document.getElementById("avatar");
      a.innerHTML = "";
      const img = document.createElement("img");
      img.src = dataUrl; img.alt = "JARVIS";
      a.appendChild(img);
    }

    function showSetup() { document.getElementById("setup-overlay").classList.add("visible"); }
    function hideSetup() { document.getElementById("setup-overlay").classList.remove("visible"); }

    let _os = "";
    function selectOs(el) {
      document.querySelectorAll(".os-opt").forEach(o => o.classList.remove("selected"));
      el.classList.add("selected");
      _os = el.dataset.os;
    }

    function submitSetup() {
      const key = document.getElementById("api-key-input").value.trim();
      const err = document.getElementById("setup-error");
      if (!key) { err.textContent = "API key required."; return; }
      if (!_os) { err.textContent = "Select an OS."; return; }
      err.textContent = "";
      socket.emit("save_setup", { api_key: key, os_system: _os });
    }

    function sendText() {
      const input = document.getElementById("text-input");
      const text  = input.value.trim();
      if (!text) return;
      input.value = ""; input.style.height = "";
      socket.emit("submit_text", text);
    }

    document.getElementById("text-input").addEventListener("input", function () {
      this.style.height = "";
      this.style.height = Math.min(this.scrollHeight, 100) + "px";
    });

    document.addEventListener("keydown", e => {
      if (e.key === "F4") { e.preventDefault(); socket.emit("toggle_mute"); return; }
      if (e.key === "Enter" && !e.shiftKey && document.activeElement?.id === "text-input") {
        e.preventDefault(); sendText();
      }
    });
  </script>
</body>
</html>
